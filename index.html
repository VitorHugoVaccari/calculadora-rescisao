<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de Recisão</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="containerForm">
      <form>
        <h1 class="titulo">Calculadora de Rescisão</h1>
        <div>
          <h2>Escolha o tipo de recisão</h2>
          <select class="tipoRescisao" id="tipoDeRescisao" required>
            <option value="vazio" selected>...</option>
            <option value="semJustaCausa">Sem Justa Causa</option>
            <option value="pedidoDeDemissao">Pedido de Demissão</option>
            <option value="comJustaCausa">Com Justa Causa</option>
          </select>
        </div>
        <div class="condicional" data-type="todos">
          <h3>Salario Mensal</h3>
          <input type="number" id="salarioMensal" required />
        </div>
        <div class="condicional" data-type="todos">
          <h3>Dias trabalhados no mês da recisão</h3>
          <input type="number" id="diasTrabalhadosMes" required />
        </div>
        <div class="condicional" data-type="todos">
          <h3>Quantos períodos de férias vencidas você possui?</h3>
          <input type="number" id="feriasVencidas" required />
        </div>
        <div
          id="admissaoRescisao"
          class="condicional proporcional"
          data-type="todos"
        >
          <h2 class="subTitulo">Admissão e Demissão</h2>
          <div>
            <h3>Insira a data de Admissão</h3>
            <input type="date" id="dataAdmissao" required />
          </div>
          <div>
            <h3>Insira a data de Demissão</h3>
            <input type="date" id="dataDemissao" required />
          </div>
        </div>
        <div class="condicional" data-type="semJustaCausa,pedidoDeDemissao">
          <h3>Dias de aviso prévio</h3>
          <input type="number" id="diasAvisoPrevio" required />
        </div>
        <button type="button" class="btnCalcular">Calcular Rescisão</button>
      </form>
    </div>
  </body>
  <script src="opcoesRescisao.js"></script>
</html>
